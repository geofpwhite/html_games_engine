name: Build and Deploy

on:
  push:
    branches: [main]

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ghcr.io/geofpwhite/html_games_engine:latest
            ghcr.io/geofpwhite/html_games_engine:${{ github.sha }}

      - uses: docker/build-push-action@v5
        with:
          context: .
          target: pgsql
          push: true
          tags: |
            ghcr.io/geofpwhite/html_games_engine-db:latest
            ghcr.io/geofpwhite/html_games_engine-db:${{ github.sha }}

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.DROPLET_IP }}
          username: geof
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd html_games_engine
            docker compose pull
            docker compose up -d
